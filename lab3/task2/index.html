<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ToDo List</title>

 
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h2>ToDo List</h2>
  </header>

  <main>
    <h1>ToDo List</h1>

 
    <div class="todo-box">
      <form id="todo-form">
        <input 
          type="text" 
          id="task-input" 
          placeholder="New Task"
        >
        <button type="submit" class="add-btn">Add</button>
      </form>
    </div>

   
    <div class="todo-box">
      <ul id="task-list"></ul>
    </div>

  </main>

 
  <script src="script.js"></script>
</body>
</html>
